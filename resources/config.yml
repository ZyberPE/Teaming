max-team-size: 5

chat:
  enabled: true

  public-chat-format: "§8[§7{TEAM}§8] {RANK} §f{PLAYER} §8» §7{MESSAGE}"

  no-team-public-chat-format: "§8[§7NoTeam§8] {RANK} §f{PLAYER} §8» §7{MESSAGE}"

  team-chat-format: "§8[§bTEAM CHAT§8] §7[{TEAM}] {RANK} §f{PLAYER} §8» §b{MESSAGE}"

nametag:
  enabled: true

  team-format: "§8[§b{TEAM}§8] §f{PLAYER}\n§a{HEALTH} HP"

  no-team-format: "§7[§8NoTeam§7] §f{PLAYER}\n§a{HEALTH} HP"

messages:
  no-team: "§cYou are not in a team."
  already-team: "§cYou are already in a team."
  team-created: "§aTeam created successfully."
  team-exists: "§cThat team already exists."
  invite-sent: "§aInvite sent to {PLAYER}."
  invited: "§eYou were invited to team §b{TEAM} §eby §f{PLAYER}"
  joined-team: "§a{PLAYER} joined the team."
  left-team: "§c{PLAYER} left the team."
  kicked-player: "§c{PLAYER} was kicked from the team."
  kicked-message: "§cYou were kicked from the team."
  cannot-kick-self: "§cYou cannot kick yourself. Use /team delete instead."
  cannot-kick-owner: "§cYou cannot kick the team owner."
  delete-warning: "§cRun /team deleteconfirm to delete your team."
  no-pending-delete: "§cYou must run /team delete first."
  team-deleted: "§cTeam deleted."
  no-invite: "§cYou have no pending invites."
  player-not-found: "§cPlayer not found."
  player-not-in-team: "§cThat player is not in your team."
  friendly-fire: "§cYou cannot hurt your teammate."
  toggled-chat-on: "§aTeam chat enabled."
  toggled-chat-off: "§cTeam chat disabled."
  leader-cannot-leave: "§cYou are the team leader."
  team-full: "§cThat team is full."
  not-leader: "§cYou are not the team leader."
  home-set: "§aTeam home set."
  home-teleport: "§aTeleported to team home."
  no-home: "§cNo team home set."
  not-in-team-chat: "§cYou must be in a team to use team chat."
